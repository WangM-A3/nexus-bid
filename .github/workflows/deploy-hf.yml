name: Deploy to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install huggingface_hub
      
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          user = api.whoami()
          username = user['name']
          repo_id = username + '/nexus-bid'
          print(f"HF user: {username}")
          print(f"Target repo: {repo_id}")
          
          # Create repo if not exists
          try:
              api.create_repo(
                  repo_id=repo_id,
                  repo_type='space',
                  space_sdk='docker',
                  token=os.environ['HF_TOKEN'],
                  private=False
              )
              print(f'Space created: {repo_id}')
          except Exception as e:
              print(f'Create repo result: {e}')
              # If already exists, continue
              if '409' not in str(e) and 'already' not in str(e).lower():
                  print('Unexpected error, but trying upload anyway...')
          
          # Upload files
          api.upload_folder(
              folder_path='.',
              repo_id=repo_id,
              repo_type='space',
              token=os.environ['HF_TOKEN'],
              ignore_patterns=['.git/*','venv/*','__pycache__/*','upload/*','output/*','*.log','.env','deploy.sh','.github/*']
          )
          print('Deployed successfully!')
          print(f'URL: https://{username}-nexus-bid.hf.space')
          PYEOF
